<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickInvoice | Create Invoice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/invoice-builder.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="app-nav">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <h2>QuickInvoice</h2>
            </div>
            <div class="nav-links">
                <a href="invoice-builder.html" class="nav-link active">Create Invoice</a>
                <a href="my-invoices.html" class="nav-link">My Invoices</a>
                <a href="upgrade.html" class="nav-link">Upgrade</a>
            </div>
            <div class="user-section">
                <i class="fas fa-user-circle"></i>
                <span id="userNameDisplay" class="user-name"></span>
                <span id="proBadge" class="badge free">Free Plan</span>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="builder-grid">
            <!-- Form Section -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-file-invoice"></i>
                    <h3>Invoice Details</h3>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-building"></i> Business Name *</label>
                    <input type="text" id="businessName" placeholder="Your business name">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-image"></i> Logo (optional)</label>
                    <input type="file" id="logoUpload" accept="image/*">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Client Name *</label>
                    <input type="text" id="clientName" placeholder="Client name">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Client Email</label>
                        <input type="email" id="clientEmail" placeholder="client@example.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-hashtag"></i> Invoice Number</label>
                        <input type="text" id="invoiceNumber" placeholder="Auto-generated">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Client Address</label>
                    <textarea id="clientAddress" rows="2"></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Date</label>
                        <input type="date" id="invoiceDate">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-money-bill-wave"></i> Currency</label>
                        <select id="currency">
                            <option value="₦">Nigerian Naira (₦)</option>
                            <option value="$">US Dollar ($)</option>
                            <option value="£">British Pound (£)</option>
                            <option value="€">Euro (€)</option>
                            <option value="₵">Ghanaian Cedi (₵)</option>
                            <option value="KSh">Kenyan Shilling (KSh)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-list"></i> Invoice Items</label>
                    <div class="items-table">
                        <div id="itemsContainer"></div>
                    </div>
                    <button type="button" class="btn-add" onclick="addItem()">
                        <i class="fas fa-plus"></i> Add Item
                    </button>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label><i class="fas fa-percent"></i> Tax Rate (%)</label>
                        <input type="number" id="taxRate" value="7.5" step="0.1">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Discount</label>
                        <input type="number" id="discount" value="0" step="1">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-sticky-note"></i> Notes</label>
                    <textarea id="notes" rows="2" placeholder="Payment terms, thank you note..."></textarea>
                </div>

                <div class="invoice-limit-warning" id="invoiceLimitWarning" style="display: none;">
                    <i class="fas fa-info-circle"></i> Free plan: You have used <span id="usedInvoices">0</span> of 2 free invoices this month.
                    <a href="upgrade.html">Upgrade to Pro</a> for unlimited invoices.
                </div>
            </div>

            <!-- Preview Section -->
            <div class="card preview-card">
                <div class="card-header">
                    <i class="fas fa-eye"></i>
                    <h3>Live Preview</h3>
                </div>
                <div id="invoicePreview"></div>

                <div class="action-buttons">
                    <button class="btn-save" onclick="saveInvoice()">
                        <i class="fas fa-save"></i> Save Invoice
                    </button>
                    <button class="btn-pdf" onclick="downloadPDF()">
                        <i class="fas fa-file-pdf"></i> Download PDF
                    </button>
                </div>

                <div id="message" class="message"></div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/invoice-builder.js"></script>
</body>
</html>
